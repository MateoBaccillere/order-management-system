services:
  postgres:
    image: postgres:17
    container_name: order-management-postgres
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d order_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  notification-service:
    build:
      context: ./notification-service/notification-service
    container_name: notification-service
    ports:
      - "8081:8081"

  product-service:
    build:
      context: ./product-service
    container_name: product-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/order_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/order_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    ports:
      - "8083:8083"

  order-service:
    build:
      context: ./order-service/order-service
    container_name: order-service
    depends_on:
      postgres:
        condition: service_healthy
      notification-service:
        condition: service_started
      product-service:
        condition: service_started
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/order_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/order_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      NOTIFICATION_SERVICE_URL: http://notification-service:8081
      PRODUCT_SERVICE_URL: http://product-service:8083
    ports:
      - "8082:8082"

volumes:
  postgres_data: